[Test]
# 测试参数
on_time = 5          # 开机保持时间（秒）
off_time = 3         # 关机保持时间（秒）
total_cycles = 0     # 总循环次数，0=无限
log_file =           # 留空自动生成文件名，如 power_test_20250330.csv

[Interface]
# 接口类型：必须设置为 serial
interface = serial
# 串口号，根据实际设备管理器中的 COM 口修改
port = COM3
# 波特率，Keithley 2303 串口默认为 4800
baudrate = 4800