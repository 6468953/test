[Test]
# 测试参数
on_time = 5          # 开机保持时间（秒）
off_time = 3         # 关机保持时间（秒）
total_cycles = 0     # 总循环次数，0=无限
log_file =           # 留空自动生成文件名，如 power_test_20250330.csv

[Interface]
# 通信接口配置
interface = gpib     # gpib 或 serial

# 如果 interface = gpib
resource = GPIB0::16::INSTR   # GPIB 地址，默认 16

# 如果 interface = serial
# port = COM3
# baudrate = 4800