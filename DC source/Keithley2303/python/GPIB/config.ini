[Test]
# 测试参数
on_time = 5          # 开机保持时间（秒）
off_time = 3         # 关机保持时间（秒）
total_cycles = 0     # 总循环次数，0=无限
log_file =           # 留空自动生成文件名，如 power_test_20250330.csv

[Interface]
# 接口类型：gpib 或 serial
interface = gpib

# 如果 interface = gpib，填写 GPIB 地址
resource = GPIB0::16::INSTR

# 如果 interface = serial，取消下面的注释并填写正确的串口号和波特率
# port = COM3
# baudrate = 4800